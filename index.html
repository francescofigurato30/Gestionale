<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionale</title>
    <!-- Tailwind CSS per una grafica pulita (opzionale, rimuovilo se usi i tuoi stili) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- SDK di Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <!-- ======================================================= -->
    <!-- 1. SCHERMATA DI LOGIN                                   -->
    <!-- ======================================================= -->
    <div id="login-container" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Accesso Gestionale</h2>
            
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="username">Utente</label>
                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="username" type="text" placeholder="Inserisci username">
            </div>
            
            <div class="mb-6 relative">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">Password</label>
                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="password" type="password" placeholder="********">
                <button type="button" onclick="togglePasswordVisibility()" class="absolute right-3 bottom-2 text-sm text-gray-500 hover:text-gray-700">Mostra</button>
            </div>
            
            <div class="flex flex-col gap-3">
                <button onclick="eseguiLogin()" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full" type="button">
                    Accedi
                </button>
                <button onclick="accessoLibero()" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full text-sm" type="button">
                    Accesso Ospite / Limitato
                </button>
            </div>
        </div>
    </div>

    <!-- ======================================================= -->
    <!-- 2. CONTENUTI DEL GESTIONALE (Nascosto di default)        -->
    <!-- ======================================================= -->
    <div id="main-container" class="hidden p-6">
        <div class="max-w-6xl mx-auto bg-white p-6 rounded-lg shadow-md">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-bold text-gray-800">Benvenuto nel Gestionale</h1>
                <div class="flex items-center gap-4">
                    <span id="user-display" class="font-semibold text-gray-600"></span>
                    <button onclick="logout()" class="bg-red-500 hover:bg-red-700 text-white text-xs font-bold py-1 px-3 rounded">Logout</button>
                </div>
            </div>
            
            <p class="text-gray-600 mb-4">I tuoi dati collegati a Supabase appariranno qui sotto.</p>
            
            <!-- Inserisci qui dentro le tue tabelle, i tuoi bottoni e le liste dei contatti -->
            <div id="dati-supabase" class="border border-dashed border-gray-300 p-8 text-center text-gray-400 rounded">
                [ Qui va il resto della tua interfaccia: tabelle, contatti, appuntamenti ]
            </div>
        </div>
    </div>

    <!-- ======================================================= -->
    <!-- 3. LOGICA JAVASCRIPT                                    -->
    <!-- ======================================================= -->
    <script>
        // CONFIGURAZIONE SUPABASE
        // Inserisci qui l'URL e la Chiave Anonima del tuo progetto Supabase
        const SUPABASE_URL = "https://TUO-PROGETTO.supabase.co";
        const SUPABASE_ANON_KEY = "LA-TUA-CHIAVE-ANONIMA-SUPABASE";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // CREDENZIALI AMMINISTRATORI
        const ADMIN_USER = 'Francesco';
        const ADMIN_PASS = 'Gestionale2026';

        const VITTO_USER = 'Vittoria';
        const VITTO_PASS = 'Gestionale2026';

        // GESTIONE VISIBILITÀ PASSWORD
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        }

        // FUNZIONE DI LOGIN PER FRANCESCO E VITTORIA
        function eseguiLogin() {
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value.trim();

            const isFrancesco = (usernameInput === ADMIN_USER && passwordInput === ADMIN_PASS);
            const isVittoria = (usernameInput === VITTO_USER && passwordInput === VITTO_PASS);

            if (isFrancesco || isVittoria) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('currentUser', usernameInput);
                localStorage.setItem('userRole', 'admin');
                controlloSessione();
            } else {
                alert('Credenziali non corrette. Riprova.');
            }
        }

        // ACCESSO LIBERO / OSPITE
        function accessoLibero() {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('currentUser', 'Ospite');
            localStorage.setItem('userRole', 'guest');
            controlloSessione();
        }

        // LOGOUT
        function logout() {
            localStorage.clear();
            location.reload();
        }

        // CONTROLLO STATO ACCESSO ALL'AVVIO DELLA PAGINA
        function controlloSessione() {
            const loginContainer = document.getElementById('login-container');
            const mainContainer = document.getElementById('main-container');
            const userDisplay = document.getElementById('user-display');

            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const currentUser = localStorage.getItem('currentUser');

            if (isLoggedIn === 'true') {
                loginContainer.classList.add('hidden');
                mainContainer.classList.remove('hidden');
                userDisplay.textContent = "Utente: " + currentUser;
                
                // Avvia qui le tue funzioni che leggono i dati da Supabase (es. caricaContatti())
                caricaDatiGestionale();
            } else {
                loginContainer.classList.remove('hidden');
                mainContainer.classList.add('hidden');
            }
        }

        // FUNZIONE ESEMPIO PER RECUPERARE DATI DA SUPABASE
        async function caricaDatiGestionale() {
            console.log("Inizializzazione caricamento dati da Supabase...");
            // Qui andranno le tue funzioni reali (es. await supabase.from('contatti').select('*'))
        }

        // Esegui il controllo non appena la pagina viene caricata
        window.onload = controlloSessione;
    </script>
</body>
</html>
